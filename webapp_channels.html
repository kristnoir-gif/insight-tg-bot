<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Выбор канала</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 0;
            overflow-x: hidden;
        }

        .header {
            position: sticky;
            top: 0;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 12px 16px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            z-index: 100;
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 12px;
            font-size: 16px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--tg-theme-button-color, #3390ec);
        }

        .counter {
            margin-top: 8px;
            font-size: 13px;
            color: var(--tg-theme-hint-color, #999);
            text-align: center;
        }

        .channel-list {
            padding: 8px 0;
        }

        .channel-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--tg-theme-hint-color, rgba(0,0,0,0.08));
            cursor: pointer;
            transition: background-color 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-item:active {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        .channel-item:last-child {
            border-bottom: none;
        }

        .channel-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .channel-info {
            flex: 1;
            min-width: 0;
        }

        .channel-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .channel-key {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #999);
            font-family: 'Courier New', monospace;
        }

        .channel-stats {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
            margin-top: 2px;
        }

        .no-results {
            padding: 40px 20px;
            text-align: center;
            color: var(--tg-theme-hint-color, #999);
        }

        .no-results-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .loading {
            padding: 40px 20px;
            text-align: center;
            color: var(--tg-theme-hint-color, #999);
        }

        .spinner {
            border: 3px solid var(--tg-theme-hint-color, #f3f3f3);
            border-top: 3px solid var(--tg-theme-button-color, #3390ec);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            padding: 20px;
            margin: 16px;
            background-color: #fee;
            border: 1px solid #fcc;
            border-radius: 8px;
            color: #c00;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <input 
            type="text" 
            id="searchInput" 
            class="search-box" 
            placeholder="🔍 Поиск каналов..."
            autocomplete="off"
        >
        <div class="counter" id="counter">Загрузка...</div>
    </div>

    <div id="channelList" class="channel-list">
        <div class="loading">
            <div class="spinner"></div>
            <div>Загрузка каналов...</div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let allChannels = [];
        let filteredChannels = [];

        // Функция для получения данных каналов
        async function loadChannels() {
            try {
                // Получаем initData для аутентификации
                const initData = tg.initData;
                
                // В реальном боте данные будут передаваться через initData или URL параметры
                // Здесь используем простой подход с передачей через URL
                const urlParams = new URLSearchParams(window.location.search);
                const channelsData = urlParams.get('channels');
                
                if (channelsData) {
                    // Декодируем данные из URL
                    allChannels = JSON.parse(decodeURIComponent(channelsData));
                } else {
                    // Загружаем через fetch (если бот предоставляет API endpoint)
                    const response = await fetch('/api/channels', {
                        headers: {
                            'Authorization': `tma ${initData}`
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error('Ошибка загрузки данных');
                    }
                    
                    allChannels = await response.json();
                }

                filteredChannels = allChannels;
                renderChannels();
                updateCounter();
                
            } catch (error) {
                console.error('Error loading channels:', error);
                showError('Ошибка загрузки каналов');
            }
        }

        // Отрисовка списка каналов
        function renderChannels() {
            const listContainer = document.getElementById('channelList');
            
            if (filteredChannels.length === 0) {
                listContainer.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <div>Каналы не найдены</div>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = filteredChannels.map(channel => {
                const initial = channel.title.charAt(0).toUpperCase();
                const stats = [];
                
                if (channel.analysis_count) {
                    stats.push(`📊 ${channel.analysis_count} анализов`);
                }
                if (channel.subscribers) {
                    stats.push(`👥 ${formatNumber(channel.subscribers)}`);
                }
                
                return `
                    <div class="channel-item" data-channel-key="${escapeHtml(channel.channel_key)}">
                        <div class="channel-icon">${initial}</div>
                        <div class="channel-info">
                            <div class="channel-title">${escapeHtml(channel.title)}</div>
                            <div class="channel-key">@${escapeHtml(channel.channel_key)}</div>
                            ${stats.length ? `<div class="channel-stats">${stats.join(' • ')}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Добавляем обработчики клика
            document.querySelectorAll('.channel-item').forEach(item => {
                item.addEventListener('click', function() {
                    const channelKey = this.getAttribute('data-channel-key');
                    selectChannel(channelKey);
                });
            });
        }

        // Обновление счетчика
        function updateCounter() {
            const counter = document.getElementById('counter');
            counter.textContent = `Найдено: ${filteredChannels.length} из ${allChannels.length}`;
        }

        // Поиск по каналам
        function filterChannels(query) {
            const lowerQuery = query.toLowerCase().trim();
            
            if (!lowerQuery) {
                filteredChannels = allChannels;
            } else {
                filteredChannels = allChannels.filter(channel => {
                    return channel.title.toLowerCase().includes(lowerQuery) ||
                           channel.channel_key.toLowerCase().includes(lowerQuery);
                });
            }
            
            renderChannels();
            updateCounter();
        }

        // Выбор канала - отправка данных обратно в бот
        function selectChannel(channelKey) {
            // Используем Telegram Web App API для отправки данных
            tg.sendData(JSON.stringify({
                action: 'analyze_channel',
                channel_key: channelKey
            }));
            
            // Закрываем Web App
            tg.close();
        }

        // Показать ошибку
        function showError(message) {
            const listContainer = document.getElementById('channelList');
            listContainer.innerHTML = `
                <div class="error-message">
                    ⚠️ ${escapeHtml(message)}
                </div>
            `;
        }

        // Утилиты
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // Обработчик поиска
        document.getElementById('searchInput').addEventListener('input', function(e) {
            filterChannels(e.target.value);
        });

        // Загружаем данные при старте
        loadChannels();

        // Настройка темы Telegram
        document.body.style.backgroundColor = tg.themeParams.bg_color || '#ffffff';
        document.body.style.color = tg.themeParams.text_color || '#000000';
    </script>
</body>
</html>
